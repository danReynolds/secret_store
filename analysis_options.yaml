include: package:lints/recommended.yaml

analyzer:
  # These are separate Flutter packages with their own analysis options. The
  # root `dart analyze` job resolves only this Dart package (no Flutter SDK),
  # so analyze each with `flutter analyze` from its own directory.
  exclude:
    - example_flutter/**
    - demo/flutter/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # A security library must not ship analyzer warnings. Treat them as errors.
    todo: ignore
    unused_import: error
    unused_local_variable: error
    dead_code: error

linter:
  rules:
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - only_throw_errors
    - prefer_final_locals
    - throw_in_finally
    - unnecessary_await_in_return
    - unnecessary_lambdas
    - unnecessary_parenthesis
