name: release on merge

# Turns a merged version bump into a release: when the core `version:` on main
# names a version that has no tag yet, this creates the signed `vX.Y.Z` and
# `keybay_cli-vX.Y.Z` tags, which trigger `publish.yml` and `release_cli.yml`.
#
# Two deliberate mechanics:
#   - The tags are created through the GitHub API, so GitHub web-flow *signs*
#     them — the publish workflows require a verified tag, and a plain
#     runner-pushed tag would not be verified.
#   - They are created with RELEASE_TAG_TOKEN, not the default GITHUB_TOKEN.
#     GitHub deliberately does not let the default token's pushes trigger other
#     workflows; a fine-grained PAT or GitHub App token (contents: write on this
#     repo) is required so the release actually starts. See doc/cli-release.md.
#
# This only helps once the one-time first-publish bootstrap is done and trusted
# publishing is enabled — before that, publish.yml / release_cli.yml still route
# a brand-new version to a manual publish. It is idempotent: a version whose tag
# already exists is a no-op, so it never re-releases.
on:
  push:
    branches: [main]
    paths: ['pubspec.yaml']

permissions:
  contents: read

jobs:
  autotag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: tag a newly merged version so the release workflows run
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          set -euo pipefail
          version="$(awk '$1 == "version:" { print $2 }' pubspec.yaml)"
          test -n "$version"
          core_tag="v$version"

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$core_tag" \
              >/dev/null 2>&1; then
            echo "$core_tag already exists; nothing to release."
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            msg="version $version has no tag, but RELEASE_TAG_TOKEN is not set, so the release cannot be triggered. Add a contents:write fine-grained PAT or GitHub App token named RELEASE_TAG_TOKEN (see doc/cli-release.md), or tag by hand with 'keybay-release publish both'."
            echo "::error title=RELEASE_TAG_TOKEN missing::$msg"
            exit 1
          fi

          # A web-flow-signed (therefore verified) annotated tag on the merge
          # commit, created with a token that CAN trigger the release workflows.
          create_signed_tag() {
            local tag="$1" message="$2" object
            object="$(gh api -X POST "repos/$GITHUB_REPOSITORY/git/tags" \
              -f "tag=$tag" -f "message=$message" \
              -f "object=$GITHUB_SHA" -f 'type=commit' --jq .sha)"
            gh api -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$tag" -f "sha=$object" >/dev/null
            echo "created $tag"
          }

          # Core first: the CLI pins, and pub.dev requires, a published core.
          create_signed_tag "$core_tag" "keybay $version"
          create_signed_tag "keybay_cli-v$version" "keybay_cli $version"
