name: ci

on:
  # `push` is scoped to main so a branch with an open PR isn't built twice
  # (once for the push, once for the PR).
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, and it runs ONLY the canary tier (crypto-pin-canary +
    # supply-chain; the test jobs skip scheduled runs): the point is to fail on
    # a newly published `cryptography` release even when the repo is idle.
    # Caveat: GitHub disables cron on public repos after ~60 days without
    # activity, so this is best-effort — the canary also runs on every push to
    # main and every PR.
    - cron: '17 6 * * 1'

# Least privilege: every job gets a read-only token unless it opts into more
# (only `supply-chain` does, for its SARIF upload).
permissions:
  contents: read

# All third-party actions are pinned by commit SHA (tags are retargetable —
# a hijacked tag is a code-execution path into CI). The trailing comment
# records the tag the SHA corresponded to when pinned.
jobs:
  analyze-and-test:
    # The weekly cron is the canary tier only (see `schedule` above).
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      # Unit tier (hermetic): crypto vectors, container/fuzz, POSIX perms,
      # backend logic over fakes, and the dependency-closure firewall.
      - run: dart test -x integration
      - run: dart test packages/keybay_cli/test -x integration
      - run: ./tool/test_cli.sh
      # Exercise the exact package archive and warning contract before a tag.
      # The 3.10 floor predates --ignore-warnings, so this belongs on the
      # current-SDK Linux lane rather than cli-minimum-sdk.
      - if: runner.os == 'Linux'
        run: |
          ./tool/validate_publish.sh . cryptography ffi
          ./tool/validate_publish.sh packages/keybay_cli ffi keybay

  cli-minimum-sdk:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.10.0
      - run: dart pub get
      # The CLI's documented SDK floor is a tested product channel, including
      # AOT/exec/PTY behavior, not only a pubspec constraint. Dart 3.10's
      # hosted-only install proof follows first publication (release runbook).
      - run: dart test packages/keybay_cli/test -x integration
      - run: KEYBAY_SKIP_DART_INSTALL=1 ./tool/test_cli.sh

  integration-macos:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: dart pub get
      # Real login Keychain round-trip.
      - run: KEYBAY_INTEGRATION=1 dart test test/keychain_integration_test.dart
      - run: ./tool/test_cli_storage.sh
      # Package, verify, extract, and execute the exact README onboarding loop
      # against the fixed-appId product. GitHub-hosted runners are disposable
      # and start without a Keybay store.
      - run: KEYBAY_QUICKSTART=1 ./tool/test_cli_quickstart.sh

  integration-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus
      - run: dart pub get
      # Real Secret Service round-trip: a throwaway D-Bus session with a fresh
      # gnome-keyring unlocked by a known password (secrets component only).
      # Recipe verified locally against real gnome-keyring in a Docker container.
      # ~/.local/share is intentionally NOT pre-created — the resolver e2e test
      # exercises the clean-account path where the library creates it (0700).
      - run: |
          KEYBAY_BENCHMARK_OUTPUT="$RUNNER_TEMP/cli-benchmark-linux.json" \
          dbus-run-session -- bash -c '
            eval "$(printf itest | gnome-keyring-daemon --daemonize --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL
            KEYBAY_INTEGRATION=1 dart test test/secret_service_integration_test.dart
            ./tool/test_cli_storage.sh
            KEYBAY_QUICKSTART=1 ./tool/test_cli_quickstart.sh
            KEYBAY_BENCHMARK=1 KEYBAY_BENCHMARK_ITERATIONS=100 \
              ./tool/benchmark_cli.sh
          '
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-benchmark-linux-x64
          path: ${{ runner.temp }}/cli-benchmark-linux.json
          if-no-files-found: error
          retention-days: 30
      # The locked-collection behavior, in its OWN D-Bus session: this test
      # locks the login collection (which a headless box can't unlock again), so
      # isolating it keeps it from stranding the unlocked tier above. It pins
      # that a locked keyring degrades to "not found" on reads and that delete()
      # fails CLOSED (KeystoreLocked) rather than reporting a removal that
      # didn't happen. KEYBAY_LOCKED_TEST is the second opt-in that keeps
      # `-t integration` on a real desktop from locking the developer's own
      # login keyring — only throwaway sessions (here, tool/test_linux.sh) set
      # it.
      - run: |
          dbus-run-session -- bash -c '
            eval "$(printf itest | gnome-keyring-daemon --daemonize --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL
            KEYBAY_INTEGRATION=1 KEYBAY_LOCKED_TEST=1 dart test test/secret_service_locked_integration_test.dart
          '
      # The CLI has its own locked-store contract: exit 69, actionable text,
      # and no secret in diagnostics. Keep it in a third disposable session
      # because this test also leaves the login collection locked.
      - run: |
          dbus-run-session -- bash -c '
            eval "$(printf itest | gnome-keyring-daemon --daemonize --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL
            KEYBAY_LOCKED_TEST=1 ./tool/test_cli_locked_storage.sh
          '

  site:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: site/Gemfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # master 2026-07-15
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec ruby tool/build_site.rb

  # Keep the scan in this workflow instead of calling Google's reusable one:
  # that workflow contains a tag-pinned download-artifact step, which violates
  # this repository's full-SHA action policy even when the reusable workflow
  # itself is pinned. Scanner findings flow through the reporter so a SARIF is
  # uploaded even when the required check fails on a vulnerability.
  supply-chain:
    name: supply-chain / osv-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write # SARIF upload
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: scan dependency lockfile
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --output=results.json
            --format=json
            --lockfile=./pubspec.lock
            --lockfile=./site/Gemfile.lock
        continue-on-error: true
      - name: report findings and fail on vulnerabilities
        uses: google/osv-scanner-action/osv-reporter-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=true
      - name: upload findings to code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
        with:
          sarif_file: results.sarif

  # The exact-pinned crypto dependency is deliberately frozen; this canary
  # fails the build when pub.dev publishes anything newer so the bump is a
  # reviewed decision (advisory check + vector firewall), never a drift.
  # OSV/GHSA coverage of pub.dev is too sparse to rely on alone — known
  # security issues in this package's AES paths were never assigned
  # advisories, so "no advisory" is weak evidence.
  crypto-pin-canary:
    runs-on: ubuntu-latest
    steps:
      - name: check pub.dev for a newer `cryptography` release
        run: |
          latest=$(curl -sS https://pub.dev/api/packages/cryptography | jq -r '.latest.version')
          echo "pub.dev latest: $latest (pinned: 2.9.0)"
          if [ "$latest" != "2.9.0" ]; then
            echo "::error::cryptography $latest published (pin is 2.9.0). Review the diff and advisories, re-run the vector firewall, then bump the pin deliberately."
            exit 1
          fi
