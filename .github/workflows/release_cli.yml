name: release keybay CLI

on:
  push:
    tags: ['keybay_cli-v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: read

concurrency:
  group: keybay-cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - name: verify tag, version, and main ancestry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          package_version="$(awk '$1 == "version:" { print $2 }' packages/keybay_cli/pubspec.yaml)"
          test "$version" = "$package_version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME" --jq .object.sha)"
          tag_verified="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq .verification.verified)"
          test "$tag_verified" = "true"
      - run: dart pub get --enforce-lockfile
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test -x integration
        working-directory: packages/keybay
      - run: dart test -x integration
        working-directory: packages/keybay_cli
      - run: ./tool/test_cli.sh
      - run: ./tool/validate_publish.sh packages/keybay_cli ffi keybay

  build-linux:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus
      - run: dart pub get --enforce-lockfile
      - name: compile and package
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          mkdir -p build/cli artifacts
          dart compile exe packages/keybay_cli/bin/keybay.dart -o build/cli/keybay
          asset="artifacts/keybay-${version}-linux-${{ matrix.arch }}.tar.gz"
          ./tool/package_cli_release.sh build/cli/keybay "$asset"
          ./tool/verify_cli_archive.sh "$asset" "$version"
          extracted="$RUNNER_TEMP/keybay-release-example-${{ matrix.arch }}"
          mkdir -p "$extracted"
          tar -xzf "$asset" -C "$extracted"
          export KEYBAY_BINARY="$extracted/keybay"
          export KEYBAY_QUICKSTART_DIR="$extracted/example/quickstart"
          export KEYBAY_QUICKSTART=1
          dbus-run-session -- bash -c '
            eval "$(printf release-test | gnome-keyring-daemon --daemonize --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL
            export PATH=/usr/bin:/bin
            ./tool/test_cli_quickstart.sh
          '
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keybay-linux-${{ matrix.arch }}
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-macos:
    needs: validate
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: dart pub get --enforce-lockfile
      - name: compile release and continuity binaries
        run: |
          mkdir -p build/cli artifacts
          dart compile exe packages/keybay_cli/bin/keybay.dart -o build/cli/keybay
          dart compile exe packages/keybay_cli/tool/integration_harness.dart \
            -o build/cli/keybay-continuity
      - name: import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          umask 077
          test -n "$CERTIFICATE_P12_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          keychain="$RUNNER_TEMP/keybay-signing.keychain-db"
          password="$(openssl rand -hex 24)"
          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/keybay-signing.p12"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$RUNNER_TEMP/keybay-signing.p12" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$password" \
            "$keychain"
          existing_keychains=()
          while IFS= read -r existing; do
            existing_keychains+=("${existing//\"/}")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$keychain" "${existing_keychains[@]}"
          {
            echo "KEYBAY_SIGNING_KEYCHAIN=$keychain"
            echo "KEYBAY_SIGNING_KEYCHAIN_PASSWORD=$password"
          } >> "$GITHUB_ENV"
      - name: Developer-ID sign and verify the frozen identity
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$SIGNING_IDENTITY"
          test -n "$APPLE_TEAM_ID"
          for binary in build/cli/keybay build/cli/keybay-continuity; do
            codesign \
              --force \
              --keychain "$KEYBAY_SIGNING_KEYCHAIN" \
              --sign "$SIGNING_IDENTITY" \
              --identifier io.github.danreynolds.keybay.cli \
              --options runtime \
              --timestamp \
              "$binary"
            ./tool/verify_macos_release.sh "$binary" "$APPLE_TEAM_ID"
          done
      - name: prove signed-build Keychain access continuity
        run: |
          sentinel="release-continuity-${GITHUB_RUN_ID}-${{ matrix.arch }}"
          # codesign (above) is done and explicitly targeted --keychain, so the
          # temporary signing keychain is no longer needed. Drop it from the
          # search list so this check runs against the LOGIN keychain — the
          # real-world store the code-identity contract is actually about. With
          # the temp keychain prepended, `keybay set` wrote the store key into
          # it and the second binary's search skipped that keychain (its
          # random password is unknown to the reader / it re-locks), so the key
          # read back as absent (StoreKeyMissing). Both binaries now share the
          # one unlocked login keychain.
          login_keychain="$(security default-keychain -d user | sed -E 's/^[[:space:]]*"//; s/"[[:space:]]*$//')"
          security list-keychains -d user -s "$login_keychain"
          echo "continuity keychain search list:"; security list-keychains -d user
          printf '%s' "$sentinel" | \
            build/cli/keybay set --stdin release-check/token
          listed="$(build/cli/keybay-continuity keybay-cli list)"
          test "$listed" = "release-check/token"
          resolved="$(build/cli/keybay-continuity keybay-cli run -f \
            <(printf 'TOKEN=kb://release-check/token\n') -- /usr/bin/printenv TOKEN)"
          test "$resolved" = "$sentinel"
          build/cli/keybay rm release-check/token
          rm -rf "$HOME/Library/Application Support/keybay-cli"
          security delete-generic-password -s keybay-cli -a store-key >/dev/null
      - name: notarize standalone binary and inspect the notary log
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          umask 077
          test -n "$NOTARY_KEY_P8_BASE64"
          test -n "$NOTARY_KEY_ID"
          test -n "$NOTARY_ISSUER_ID"
          printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 -D > "$RUNNER_TEMP/notary-key.p8"
          ditto -c -k --keepParent build/cli/keybay "$RUNNER_TEMP/keybay-notary.zip"
          xcrun notarytool submit "$RUNNER_TEMP/keybay-notary.zip" \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait \
            --timeout 30m \
            --output-format json > "$RUNNER_TEMP/notary-result.json"
          submission_id="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["id"])' "$RUNNER_TEMP/notary-result.json")"
          submission_status="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["status"])' "$RUNNER_TEMP/notary-result.json")"
          test "$submission_status" = "Accepted"
          xcrun notarytool log "$submission_id" "$RUNNER_TEMP/notary-log.json" \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"
          python3 -c 'import json,sys; data=json.load(open(sys.argv[1])); issues=data.get("issues", []); print(json.dumps(issues, indent=2)); raise SystemExit(bool(issues))' "$RUNNER_TEMP/notary-log.json"
          # Notarization is proven by the Accepted submission status and the
          # empty issue log above, plus the Developer-ID + hardened-runtime
          # codesign checks in tool/verify_macos_release.sh (signing step).
          # There is deliberately no spctl assessment here: Apple does not
          # staple tickets to a bare Mach-O, and `spctl --assess --type execute`
          # only assesses application *bundles* — it rejects any standalone
          # binary as "the code is valid but does not seem to be an app",
          # regardless of notarization. A CLI executable has no applicable
          # Gatekeeper-bundle assessment.
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          cp "$RUNNER_TEMP/notary-result.json" \
            "artifacts/keybay-${version}-macos-${{ matrix.arch }}.notary-result.json"
          cp "$RUNNER_TEMP/notary-log.json" \
            "artifacts/keybay-${version}-macos-${{ matrix.arch }}.notary-log.json"
      - name: package signed and notarized binary
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          asset="artifacts/keybay-${version}-macos-${{ matrix.arch }}.tar.gz"
          ./tool/package_cli_release.sh build/cli/keybay "$asset"
          ./tool/verify_cli_archive.sh "$asset" "$version"
          extracted="$RUNNER_TEMP/keybay-release-example-${{ matrix.arch }}"
          mkdir -p "$extracted"
          tar -xzf "$asset" -C "$extracted"
          KEYBAY_BINARY="$extracted/keybay" \
          KEYBAY_QUICKSTART_DIR="$extracted/example/quickstart" \
          KEYBAY_QUICKSTART=1 \
          PATH=/usr/bin:/bin \
            ./tool/test_cli_quickstart.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keybay-macos-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
      - name: clean signing material and disposable store
        if: always()
        run: |
          rm -rf "$HOME/Library/Application Support/keybay-cli"
          security delete-generic-password -s keybay-cli -a store-key >/dev/null 2>&1 || true
          if [[ -n "${KEYBAY_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$KEYBAY_SIGNING_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/keybay-signing.p12" "$RUNNER_TEMP/notary-key.p8"

  publish-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: keybay-*
          merge-multiple: true
      - name: verify Homebrew tap preconditions
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "$GH_TOKEN"
          gh api repos/danReynolds/homebrew-tap --jq .full_name
      - name: checksums and Homebrew formula
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          find dist -maxdepth 1 -type f \
            \( -name '*.tar.gz' -o -name '*.json' \) -print0 | \
            sort -z | xargs -0 sha256sum | sed 's#  dist/#  #' > dist/SHA256SUMS
          python3 tool/render_homebrew_formula.py "$version" dist dist/keybay.rb
          ruby -c dist/keybay.rb
      - uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/*
      - name: create or repair GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/* \
              --verify-tag \
              --generate-notes \
              --title "Keybay CLI $version"
          fi
      - name: publish formula to danReynolds/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          content="$(base64 -w0 dist/keybay.rb)"
          sha="$(gh api repos/danReynolds/homebrew-tap/contents/Formula/keybay.rb --jq .sha 2>/dev/null || true)"
          args=(
            --method PUT
            repos/danReynolds/homebrew-tap/contents/Formula/keybay.rb
            -f "message=keybay $version"
            -f "content=$content"
            -f "branch=main"
          )
          if [[ -n "$sha" ]]; then
            args+=(-f "sha=$sha")
          fi
          gh api "${args[@]}"

  accept-homebrew:
    needs: publish-release
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install and exercise the published Homebrew channel without Dart
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          brew tap danreynolds/tap
          brew install danreynolds/tap/keybay
          prefix="$(brew --prefix keybay)"
          binary="$prefix/bin/keybay"
          test "$(PATH=/usr/bin:/bin "$binary" --version)" = "$version"
          PATH=/usr/bin:/bin "$binary" doctor
          KEYBAY_BINARY="$binary" \
          KEYBAY_QUICKSTART_DIR="$prefix/share/keybay/example/quickstart" \
          KEYBAY_QUICKSTART=1 \
          PATH=/usr/bin:/bin \
            ./tool/test_cli_quickstart.sh

  accept-linux-archive:
    needs: publish-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus
      - name: verify and exercise the published Linux channel without Dart
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#keybay_cli-v}"
          asset="keybay-${version}-linux-x64.tar.gz"
          release_dir="$RUNNER_TEMP/keybay-published-release"
          mkdir -p "$release_dir"
          cd "$release_dir"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --pattern SHA256SUMS
          checksum_line="$(awk -v name="$asset" '$2 == name { print }' SHA256SUMS)"
          test "$(printf '%s\n' "$checksum_line" | wc -l)" -eq 1
          printf '%s\n' "$checksum_line" | sha256sum -c -
          gh attestation verify "$asset" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release_cli.yml" \
            --source-ref "$GITHUB_REF" \
            --deny-self-hosted-runners
          archive="$release_dir/$asset"
          cd "$GITHUB_WORKSPACE"
          ./tool/verify_cli_archive.sh "$archive" "$version"
          mkdir "$release_dir/extracted"
          tar -xzf "$archive" -C "$release_dir/extracted"
          export KEYBAY_BINARY="$release_dir/extracted/keybay"
          export KEYBAY_QUICKSTART_DIR="$release_dir/extracted/example/quickstart"
          export KEYBAY_QUICKSTART=1
          dbus-run-session -- bash -c '
            eval "$(printf release-acceptance | gnome-keyring-daemon --daemonize --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL
            export PATH=/usr/bin:/bin
            "$KEYBAY_BINARY" doctor
            ./tool/test_cli_quickstart.sh
          '

  publish-pub:
    needs: [accept-homebrew, accept-linux-archive]
    runs-on: ubuntu-24.04
    environment: pub.dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - run: dart pub get --enforce-lockfile
        working-directory: packages/keybay_cli
      - run: ./tool/validate_publish.sh packages/keybay_cli ffi keybay
      - name: publish to pub.dev through GitHub OIDC
        run: dart pub publish --force
        working-directory: packages/keybay_cli
