name: publish

# Publishes to pub.dev via trusted publishing (OIDC — no long-lived token is
# stored in the repo) when a v-prefixed version tag is pushed. The tag must
# match the `version:` in packages/keybay/pubspec.yaml. The core package
# publishes directly from packages/keybay (no staging — it is a plain workspace
# member, not the workspace root).
#
# 0.1.0 was published manually to bootstrap the package name (pub.dev cannot
# automate a first publication) and trusted publishing is now enabled, so every
# tag publishes through OIDC.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

# Least privilege: the default token stays read-only; only the publish job
# opts into the OIDC id-token it needs.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: pub.dev
    permissions:
      contents: read
      id-token: write # mint the OIDC token pub.dev verifies
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      - name: verify signed tag, version, and main ancestry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(awk '$1 == "version:" { print $2 }' packages/keybay/pubspec.yaml)"
          test "$version" = "$package_version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME" --jq .object.sha)"
          tag_verified="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq .verification.verified)"
          test "$tag_verified" = "true"
      - run: dart pub get --enforce-lockfile
      # Prove the tagged ref itself. The ancestry check above passes the
      # moment a commit lands on main — even before that commit's own CI has
      # finished — and branch protection is a repo setting this workflow
      # cannot see. So the unit tier (dependency-closure snapshot, crypto
      # vector firewall, container fuzz) re-runs here against the exact bytes
      # being published, mirroring release_cli.yml's validate job.
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test -x integration
        working-directory: packages/keybay
      - run: ./tool/validate_publish.sh packages/keybay cryptography ffi
      - name: publish to pub.dev through GitHub OIDC
        run: dart pub -C packages/keybay publish --force
